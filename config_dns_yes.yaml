  # 以上为代理地址请插入
proxy-groups:
  - name: 🔮 负载均衡
    type: load-balance
    url: http://www.google.com/generate_204
    interval: 300
    strategy: consistent-hashing
    proxies:
      - CF:104.17.194.162
      - CF:104.17.194.24
      - CF:104.16.6.67
      - CF:104.17.194.214
      - CF:104.17.194.34
      # 以上为负载均衡下面的代理地址请插入
rules:
  - MATCH, 🔮 负载均衡
