port: 7890
socks-port: 7891
allow-lan: true
ipv6: false
mode: Rule
log-level: info
tcp-concurrent: true
dns:
  # 开启Clash内置DNS服务器
  enable: true
  # 开启模式fake-ip
  enhanced-mode: fake-ip
  listen: 0.0.0.0:9053
  fake-ip-range: 12.0.0.0/24
proxies:
  - {name: CF:104.17.194.162, server: 104.17.194.162, port: 80, type: vless, uuid: 2e632913-bae0-4855-893c-02c828c835a2, tls: false, network: ws, ws-opts: {path: '/?ed=2048', headers: {Host: 56e5.hebe061103.workers.dev}}}
  - {name: CF:104.17.194.24, server: 104.17.194.24, port: 80, type: vless, uuid: 3ada7b0b-4734-448f-adc6-b88a40f65518, tls: false, network: ws, ws-opts: {path: '/?ed=2048', headers: {Host: d0d7.hebe061103.workers.dev}}}
  - {name: CF:104.16.6.67, server: 104.16.6.67, port: 80, type: vless, uuid: 27b9fc10-48a1-42e4-aef1-aef97860fa3a, tls: false, network: ws, ws-opts: {path: '/?ed=2048', headers: {Host: 0a79.hebe061103.workers.dev}}}
  - {name: CF:104.17.194.214, server: 104.17.194.214, port: 80, type: vless, uuid: efe6c33a-5bb7-4aa6-aa79-ad43fe7f86ad, tls: false, network: ws, ws-opts: {path: '/?ed=2048', headers: {Host: 7a34.hebe061103.workers.dev}}}
